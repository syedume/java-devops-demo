apiVersion : autoscailing/v2
kind: HorizontalPodAutoscaler
metadata:
  name: java-demo-hpa
  namespace: java-devops-demo
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: java-demo-deployment
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 50
    
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 50