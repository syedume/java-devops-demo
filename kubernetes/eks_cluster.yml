apiVerison: eksctl.io/v1alpha5
kind: ClusterConfig
metadata:
  name: java-devops-demo
  region: ap-south-1
  version: "1.33"
nodeGroups:
  - name: worker-nodes
    instanceType: t2.medium
    desiredCapacity: 2
    minSize: 2
    maxSize: 3

    volumeSize: 20

    ssh:
      allow: false
